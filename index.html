<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doni AR Book</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; font-family: sans-serif; }

      #loading-screen {
        position: fixed; inset: 0; background: #1a0a2e;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.6s ease;
      }
      #loading-screen.hidden { opacity: 0; pointer-events: none; }
      .loading-logo { font-size: 2.5rem; font-weight: 900; color: #fff; letter-spacing: -1px; margin-bottom: 1rem; }
      .loading-logo span { color: #ff6b35; }
      .loading-sub { font-size: 0.85rem; color: rgba(255,255,255,0.5); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 2.5rem; }
      .loading-bar-wrap { width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; }
      .loading-bar { height: 100%; background: linear-gradient(90deg, #ff6b35, #ffd166); border-radius: 99px; animation: loadpulse 1.8s ease-in-out infinite; }
      @keyframes loadpulse { 0%{width:0%} 60%{width:90%} 100%{width:100%} }
      .loading-tip { margin-top: 2rem; font-size: 0.78rem; color: rgba(255,255,255,0.35); text-align: center; max-width: 260px; line-height: 1.6; }

      #scan-hint {
        position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.6); color: white; padding: 0.6rem 1.4rem;
        border-radius: 99px; font-size: 0.8rem; letter-spacing: 1px;
        pointer-events: none; opacity: 1; transition: opacity 0.5s; white-space: nowrap; z-index: 20;
      }
      #scan-hint.hidden { opacity: 0; }

      #tap-layer { display: none; position: fixed; inset: 0; z-index: 10; pointer-events: none; }
      #tap-layer.active { display: block; }
      .tap-zone {
        position: absolute; pointer-events: all; cursor: pointer;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        -webkit-tap-highlight-color: rgba(255,107,53,0.3);
        /* border: 2px solid red; */ /* ← uncomment to debug */
      }
    </style>
  </head>
  <body>

    <div id="loading-screen">
      <div class="loading-logo">Doni <span>AR</span></div>
      <div class="loading-sub">Kids Book Experience</div>
      <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
      <div class="loading-tip">Point your camera at the book page to begin the magic ✨</div>
    </div>

    <div id="scan-hint">📖 Scan the book page</div>

    <div id="tap-layer">
      <div class="tap-zone" id="zone1" data-char="1"></div>
      <div class="tap-zone" id="zone2" data-char="2"></div>
      <div class="tap-zone" id="zone3" data-char="3"></div>
      <div class="tap-zone" id="zone4" data-char="4"></div>
      <div class="tap-zone" id="zone5" data-char="5"></div>
      <div class="tap-zone" id="zone6" data-char="6"></div>
    </div>

    <!--
      pose-smoother component must be registered BEFORE <a-scene> is parsed.
      It intercepts the raw MindAR matrix every tick and lerps both position
      and quaternion (rotation), then writes the smoothed result back.
      This stabilises everything — stills, videos, anchors — at the source,
      so the AR visuals and tap zones are all smooth regardless of distance.
    -->
    <script>
      AFRAME.registerComponent('pose-smoother', {
        schema: {
          // Lower = smoother / more lag. 0.07 is a good default.
          // Try 0.05 for very close-up use, 0.10 for faster response.
          factor: { type: 'number', default: 0.07 }
        },
        init() {
          const T = AFRAME.THREE;
          this.smoothPos  = new T.Vector3();
          this.smoothQuat = new T.Quaternion();
          this.rawPos     = new T.Vector3();
          this.rawQuat    = new T.Quaternion();
          this.rawScale   = new T.Vector3();
          this.ready      = false;
        },
        tick() {
          const obj = this.el.object3D;
          if (!obj.visible) {
            this.ready = false; // reset so next detection snaps, not slides
            return;
          }
          obj.matrix.decompose(this.rawPos, this.rawQuat, this.rawScale);
          if (!this.ready) {
            this.smoothPos.copy(this.rawPos);
            this.smoothQuat.copy(this.rawQuat);
            this.ready = true;
          } else {
            const f = this.data.factor;
            this.smoothPos.lerp(this.rawPos, f);
            this.smoothQuat.slerp(this.rawQuat, f); // slerp = correct lerp for rotations
          }
          obj.position.copy(this.smoothPos);
          obj.quaternion.copy(this.smoothQuat);
          obj.scale.copy(this.rawScale); // keep MindAR's scale (marker size)
        }
      });
    </script>

    <a-scene
      mindar-image="imageTargetSrc: assets/marker.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <img id="still-img" src="assets/still_picture.png" />
        <video id="vid1" src="assets/animation.mp4" playsinline preload="auto" crossorigin="anonymous"></video>
        <video id="vid2" src="assets/animation.mp4" playsinline preload="auto" crossorigin="anonymous"></video>
        <video id="vid3" src="assets/animation.mp4" playsinline preload="auto" crossorigin="anonymous"></video>
        <video id="vid4" src="assets/animation.mp4" playsinline preload="auto" crossorigin="anonymous"></video>
        <video id="vid5" src="assets/animation.mp4" playsinline preload="auto" crossorigin="anonymous"></video>
        <video id="vid6" src="assets/animation.mp4" playsinline preload="auto" crossorigin="anonymous"></video>
      </a-assets>

      <a-camera id="ar-cam" position="0 0 0" look-controls="enabled: false"></a-camera>

      <!--
        pose-smoother is attached to the TARGET entity — the parent of all AR content.
        Smoothing the parent smooths everything inside it (stills, videos, anchors).
        factor="0.07" — tune lower for smoother, higher for snappier.
      -->
      <a-entity mindar-image-target="targetIndex: 0" pose-smoother="factor: 0.07">

        <!-- ── CHAR 1: Thumbs up / HEBAT (top-left) ── -->
        <a-entity id="anchor1" position="-0.35  0.22  0.01"></a-entity>
        <a-image  id="still1"  src="#still-img" position="-0.35  0.22  0.01" width="0.28" height="0.18"></a-image>
        <a-video  id="video1"  src="#vid1" position="-0.35  0.32  0.01" width="0.40" height="0.225" rotation="90 0 0" visible="false"></a-video>

        <!-- ── CHAR 2: Surprised / KEREN (center-left) ── -->
        <a-entity id="anchor2" position="-0.05  0.00  0.01"></a-entity>
        <a-image  id="still2"  src="#still-img" position="-0.05  0.00  0.01" width="0.28" height="0.18"></a-image>
        <a-video  id="video2"  src="#vid2" position="-0.05  0.10  0.01" width="0.40" height="0.225" rotation="90 0 0" visible="false"></a-video>

        <!-- ── CHAR 3: Peeking / PINTAR (bottom-left) ── -->
        <a-entity id="anchor3" position="-0.35 -0.22  0.01"></a-entity>
        <a-image  id="still3"  src="#still-img" position="-0.35 -0.22  0.01" width="0.28" height="0.18"></a-image>
        <a-video  id="video3"  src="#vid3" position="-0.35 -0.12  0.01" width="0.40" height="0.225" rotation="90 0 0" visible="false"></a-video>

        <!-- ── CHAR 4: Pointing / JELEK (top-right) ── -->
        <a-entity id="anchor4" position=" 0.30  0.22  0.01"></a-entity>
        <a-image  id="still4"  src="#still-img" position=" 0.30  0.22  0.01" width="0.28" height="0.18"></a-image>
        <a-video  id="video4"  src="#vid4" position=" 0.30  0.32  0.01" width="0.40" height="0.225" rotation="90 0 0" visible="false"></a-video>

        <!-- ── CHAR 5: Pointing left / BADOH (center-right) ── -->
        <a-entity id="anchor5" position=" 0.30  0.00  0.01"></a-entity>
        <a-image  id="still5"  src="#still-img" position=" 0.30  0.00  0.01" width="0.28" height="0.18"></a-image>
        <a-video  id="video5"  src="#vid5" position=" 0.30  0.10  0.01" width="0.40" height="0.225" rotation="90 0 0" visible="false"></a-video>

        <!-- ── CHAR 6: Angry / BENCI (bottom-right) ── -->
        <a-entity id="anchor6" position=" 0.30 -0.22  0.01"></a-entity>
        <a-image  id="still6"  src="#still-img" position=" 0.30 -0.22  0.01" width="0.28" height="0.18"></a-image>
        <a-video  id="video6"  src="#vid6" position=" 0.30 -0.12  0.01" width="0.40" height="0.225" rotation="90 0 0" visible="false"></a-video>

      </a-entity>
    </a-scene>

    <script>
      window.addEventListener('load', () => {
        setTimeout(() => document.getElementById('loading-screen').classList.add('hidden'), 2200);
      });

      const sceneEl  = document.querySelector('a-scene');
      const tapLayer = document.getElementById('tap-layer');
      const scanHint = document.getElementById('scan-hint');
      let   isTracking = false;

      // ── 3D → 2D projection (reads already-smoothed world positions) ──────────
      const THREE  = AFRAME.THREE;
      const tmpVec = new THREE.Vector3();
      const camPos = new THREE.Vector3();
      const ancPos = new THREE.Vector3();

      // Secondary 2D lerp on top of the 3D smoothing — keeps tap zones
      // extra stable even if there's any residual screen-space jitter.
      const LERP2D = 0.25;
      const smooth = {};
      for (let i = 1; i <= 6; i++) smooth[i] = { x: 0, y: 0, size: 100, init: false };

      function projectToScreen(anchorEl, camera) {
        anchorEl.object3D.getWorldPosition(ancPos);
        tmpVec.copy(ancPos);
        tmpVec.project(camera.object3D.children[0] || camera.object3D);
        const x = ( tmpVec.x + 1) / 2 * window.innerWidth;
        const y = (-tmpVec.y + 1) / 2 * window.innerHeight;
        camera.object3D.getWorldPosition(camPos);
        const dist = camPos.distanceTo(ancPos);
        const size = Math.min(Math.max(200 / dist, 60), 400);
        return { x, y, size };
      }

      function updateTapZones() {
        if (!isTracking) return;
        const camera = document.getElementById('ar-cam');
        if (!camera || !camera.object3D) return;

        for (let i = 1; i <= 6; i++) {
          const anchor = document.getElementById('anchor' + i);
          const zone   = document.getElementById('zone'   + i);
          if (!anchor || !zone) continue;

          const raw = projectToScreen(anchor, camera);
          const s   = smooth[i];

          if (!s.init) {
            s.x = raw.x; s.y = raw.y; s.size = raw.size; s.init = true;
          } else {
            s.x    += (raw.x    - s.x)    * LERP2D;
            s.y    += (raw.y    - s.y)    * LERP2D;
            s.size += (raw.size - s.size) * LERP2D;
          }

          zone.style.left   = s.x    + 'px';
          zone.style.top    = s.y    + 'px';
          zone.style.width  = s.size + 'px';
          zone.style.height = s.size + 'px';
        }
        requestAnimationFrame(updateTapZones);
      }

      // ── Marker tracking ───────────────────────────────────────────────────────
      sceneEl.addEventListener('loaded', () => {
        const target = document.querySelector('[mindar-image-target]');

        target.addEventListener('targetFound', () => {
          isTracking = true;
          tapLayer.classList.add('active');
          scanHint.classList.add('hidden');
          requestAnimationFrame(updateTapZones);
        });

        target.addEventListener('targetLost', () => {
          isTracking = false;
          tapLayer.classList.remove('active');
          scanHint.classList.remove('hidden');
          for (let i = 1; i <= 6; i++) smooth[i].init = false;
          stopAll();
        });
      });

      // ── Stop all ──────────────────────────────────────────────────────────────
      let activeChar = null;

      function stopAll() {
        for (let i = 1; i <= 6; i++) {
          const vEl   = document.getElementById('vid'   + i);
          const video = document.getElementById('video' + i);
          const still = document.getElementById('still' + i);
          if (!vEl || !video || !still) continue;
          vEl.pause(); vEl.currentTime = 0;
          video.setAttribute('visible', 'false');
          still.setAttribute('visible', 'true');
        }
        activeChar = null;
      }

      // ── Play character video in AR ────────────────────────────────────────────
      function playChar(n) {
        if (activeChar !== null && activeChar !== n) stopAll();
        const vEl   = document.getElementById('vid'   + n);
        const video = document.getElementById('video' + n);
        const still = document.getElementById('still' + n);
        still.setAttribute('visible', 'false');
        video.setAttribute('visible', 'true');
        activeChar = n;
        vEl.currentTime = 0;
        vEl.play().catch(err => console.warn('Play error:', err));
        vEl.onended = () => {
          video.setAttribute('visible', 'false');
          still.setAttribute('visible', 'true');
          activeChar = null;
        };
      }

      // ── Tap zones ─────────────────────────────────────────────────────────────
      document.querySelectorAll('.tap-zone').forEach(zone => {
        const n = parseInt(zone.getAttribute('data-char'));
        zone.addEventListener('touchend', (e) => {
          e.preventDefault();
          playChar(n);
        }, { passive: false });
        zone.addEventListener('click', () => playChar(n));
      });
    </script>
  </body>
</html>
