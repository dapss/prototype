<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doni AR Book</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; font-family: sans-serif; }

      /* Loading */
      #loading-screen {
        position: fixed; inset: 0;
        background: #1a0a2e;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s ease;
      }
      #loading-screen.hidden { opacity: 0; pointer-events: none; }
      .loading-logo { font-size: 2.5rem; font-weight: 900; color: #fff; letter-spacing: -1px; margin-bottom: 1rem; }
      .loading-logo span { color: #ff6b35; }
      .loading-sub { font-size: 0.85rem; color: rgba(255,255,255,0.5); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 2.5rem; }
      .loading-bar-wrap { width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; }
      .loading-bar { height: 100%; background: linear-gradient(90deg, #ff6b35, #ffd166); border-radius: 99px; animation: loadpulse 1.8s ease-in-out infinite; }
      @keyframes loadpulse { 0%{width:0%} 60%{width:90%} 100%{width:100%} }
      .loading-tip { margin-top: 2rem; font-size: 0.78rem; color: rgba(255,255,255,0.35); text-align: center; max-width: 260px; line-height: 1.6; }

      /* Scan hint */
      #scan-hint {
        position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.6); color: white;
        padding: 0.6rem 1.4rem; border-radius: 99px;
        font-size: 0.8rem; letter-spacing: 1px;
        pointer-events: none; opacity: 1; transition: opacity 0.5s; white-space: nowrap;
      }
      #scan-hint.hidden { opacity: 0; }

      /* Tap layer */
      #tap-layer { display: none; position: fixed; inset: 0; z-index: 10; pointer-events: none; }
      #tap-layer.active { display: block; }
      .tap-zone {
        position: absolute; pointer-events: all; cursor: pointer;
        border-radius: 12px;
        -webkit-tap-highlight-color: rgba(255,107,53,0.25);
        /* border: 2px solid red; */ /* ← uncomment to debug tap zone positions */
      }
    </style>
  </head>
  <body>

    <!-- Loading -->
    <div id="loading-screen">
      <div class="loading-logo">Doni <span>AR</span></div>
      <div class="loading-sub">Kids Book Experience</div>
      <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
      <div class="loading-tip">Point your camera at the book page to begin the magic ✨</div>
    </div>

    <!-- Scan hint -->
    <div id="scan-hint">📖 Scan the book page</div>

    <!--
      HTML Tap Zones — invisible divs over each character.
      Tapping triggers the in-AR video plane for that character.
      Adjust left/top/width/height % to fine-tune after testing on device.
      Uncomment the border CSS above to see the zones while debugging.
    -->
    <div id="tap-layer">
      <div class="tap-zone" data-char="1" style="left:5%;  top:15%; width:30%; height:30%;"></div>
      <div class="tap-zone" data-char="2" style="left:10%; top:38%; width:28%; height:28%;"></div>
      <div class="tap-zone" data-char="3" style="left:5%;  top:62%; width:28%; height:28%;"></div>
      <div class="tap-zone" data-char="4" style="left:60%; top:10%; width:35%; height:32%;"></div>
      <div class="tap-zone" data-char="5" style="left:55%; top:38%; width:40%; height:28%;"></div>
      <div class="tap-zone" data-char="6" style="left:60%; top:62%; width:35%; height:28%;"></div>
    </div>

    <!-- AR Scene -->
    <a-scene
      mindar-image="imageTargetSrc: assets/marker.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <img id="still-img" src="assets/still_picture.png" />
        <!--
          One <video> element per character so each plays independently.
          playsinline is CRITICAL for iOS — without it, video goes fullscreen.
        -->
        <video id="vid1" src="assets/animation.mp4" playsinline preload="auto" crossorigin="anonymous"></video>
        <video id="vid2" src="assets/animation.mp4" playsinline preload="auto" crossorigin="anonymous"></video>
        <video id="vid3" src="assets/animation.mp4" playsinline preload="auto" crossorigin="anonymous"></video>
        <video id="vid4" src="assets/animation.mp4" playsinline preload="auto" crossorigin="anonymous"></video>
        <video id="vid5" src="assets/animation.mp4" playsinline preload="auto" crossorigin="anonymous"></video>
        <video id="vid6" src="assets/animation.mp4" playsinline preload="auto" crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">

        <!--
          COORDINATE SYSTEM:
            Center of marker = (0, 0, 0)
            X: negative = left, positive = right  (marker width = 1 unit)
            Y: positive = up,   negative = down
            Z: positive = closer to camera (above book surface)

          Each character pair:
            <a-image> = still placeholder, visible by default
            <a-video> = in-AR video plane, hidden by default
              - same x,y as still but z=0.02 (slightly more forward)
              - width/height: match your video's aspect ratio
                landscape 16:9 → width=0.40, height=0.225

          When tapped: still hides, video shows + plays in place.
          When video ends: video hides, still comes back.
        -->

        <!--
          VIDEO ROTATION EXPLAINED:
          By default a-video lays flat on the book (like a sticker).
          rotation="-90 0 0" stands it upright like a billboard.
          The Y position is raised so the video floats above the character.
          Z is pulled forward slightly so it doesn't clip into the book.

          Position:  x  (same as still)
                     y  (raised up — increase this to make it float higher)
                     z  (same as still, just above book surface)
        -->

        <!-- ── CHAR 1: Thumbs up / HEBAT (top-left) ── -->
        <a-image id="still1" src="#still-img" position="-0.35  0.22  0.01" width="0.28" height="0.18"></a-image>
        <a-video id="video1" src="#vid1"      position="-0.35  0.32  0.01" width="0.40" height="0.225" rotation="90 0 0" visible="false"></a-video>

        <!-- ── CHAR 2: Surprised / KEREN (center-left) ── -->
        <a-image id="still2" src="#still-img" position="-0.05  0.00  0.01" width="0.28" height="0.18"></a-image>
        <a-video id="video2" src="#vid2"      position="-0.05  0.10  0.01" width="0.40" height="0.225" rotation="90 0 0" visible="false"></a-video>

        <!-- ── CHAR 3: Peeking / PINTAR (bottom-left) ── -->
        <a-image id="still3" src="#still-img" position="-0.35 -0.22  0.01" width="0.28" height="0.18"></a-image>
        <a-video id="video3" src="#vid3"      position="-0.35 -0.12  0.01" width="0.40" height="0.225" rotation="90 0 0" visible="false"></a-video>

        <!-- ── CHAR 4: Pointing / JELEK (top-right) ── -->
        <a-image id="still4" src="#still-img" position=" 0.30  0.22  0.01" width="0.28" height="0.18"></a-image>
        <a-video id="video4" src="#vid4"      position=" 0.30  0.32  0.01" width="0.40" height="0.225" rotation="90 0 0" visible="false"></a-video>

        <!-- ── CHAR 5: Pointing left / BADOH (center-right) ── -->
        <a-image id="still5" src="#still-img" position=" 0.30  0.00  0.01" width="0.28" height="0.18"></a-image>
        <a-video id="video5" src="#vid5"      position=" 0.30  0.10  0.01" width="0.40" height="0.225" rotation="90 0 0" visible="false"></a-video>

        <!-- ── CHAR 6: Angry / BENCI (bottom-right) ── -->
        <a-image id="still6" src="#still-img" position=" 0.30 -0.22  0.01" width="0.28" height="0.18"></a-image>
        <a-video id="video6" src="#vid6"      position=" 0.30 -0.12  0.01" width="0.40" height="0.225" rotation="90 0 0" visible="false"></a-video>

      </a-entity>
    </a-scene>

    <script>
      // ── Loading screen ──────────────────────────────────────────────────────
      window.addEventListener('load', () => {
        setTimeout(() => document.getElementById('loading-screen').classList.add('hidden'), 2200);
      });

      const sceneEl  = document.querySelector('a-scene');
      const tapLayer = document.getElementById('tap-layer');
      const scanHint = document.getElementById('scan-hint');

      // ── Show/hide tap layer with marker tracking ────────────────────────────
      sceneEl.addEventListener('loaded', () => {
        const target = document.querySelector('[mindar-image-target]');

        target.addEventListener('targetFound', () => {
          tapLayer.classList.add('active');
          scanHint.classList.add('hidden');
        });

        target.addEventListener('targetLost', () => {
          tapLayer.classList.remove('active');
          scanHint.classList.remove('hidden');
          stopAll(); // pause everything when book is out of frame
        });
      });

      // ── Stop all characters ─────────────────────────────────────────────────
      let activeChar = null;

      function stopAll() {
        for (let i = 1; i <= 6; i++) {
          const vEl   = document.getElementById('vid'   + i);
          const video = document.getElementById('video' + i);
          const still = document.getElementById('still' + i);
          if (!vEl || !video || !still) continue;
          vEl.pause();
          vEl.currentTime = 0;
          video.setAttribute('visible', 'false');
          still.setAttribute('visible', 'true');
        }
        activeChar = null;
      }

      // ── Play a character's video in AR ──────────────────────────────────────
      function playChar(n) {
        // Stop whoever was playing before
        if (activeChar !== null && activeChar !== n) stopAll();

        const vEl   = document.getElementById('vid'   + n);
        const video = document.getElementById('video' + n);
        const still = document.getElementById('still' + n);

        // Swap still → video plane
        still.setAttribute('visible', 'false');
        video.setAttribute('visible', 'true');
        activeChar = n;

        // Play — must be called inside the touch handler for iOS
        vEl.currentTime = 0;
        vEl.play().catch(err => console.warn('Play error char ' + n + ':', err));

        // Restore still when done
        vEl.onended = () => {
          video.setAttribute('visible', 'false');
          still.setAttribute('visible', 'true');
          activeChar = null;
        };
      }

      // ── Wire tap zones (iOS-safe touchend) ─────────────────────────────────
      document.querySelectorAll('.tap-zone').forEach(zone => {
        const n = parseInt(zone.getAttribute('data-char'));

        zone.addEventListener('touchend', (e) => {
          e.preventDefault(); // stops ghost click and scroll
          playChar(n);
        }, { passive: false });

        // Desktop fallback
        zone.addEventListener('click', () => playChar(n));
      });
    </script>
  </body>
</html>
